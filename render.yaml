services:
  - type: web
    name: appboutique-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        fromService:
          name: appboutique-web
          type: web
          property: url
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASS
        sync: false
      - key: DEFAULT_SENDER_EMAIL
        value: devjsfullstrack@gmail.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TOTP_APP_NAME
        value: AppBoutique
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: ADMIN_NAME
        value: Administrateur
      - key: ADMIN_EMAIL
        value: devjsfullstrack@gmail.com
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: appboutique-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build --workspace client
    staticPublishPath: client/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          name: appboutique-api
          type: web
          property: url
        previewValue: https://appboutique-api.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
